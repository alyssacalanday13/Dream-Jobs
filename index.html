<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Discovery Game</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background-color: #f0fbff;
            text-align: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #target-word {
            font-size: 80px;
            color: #2c3e50;
            background: white;
            padding: 20px 50px;
            border-radius: 20px;
            border: 8px solid #3498db;
            margin-bottom: 30px;
            box-shadow: 0 10px 0 #2980b9;
        }

        #options-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .job-card {
            background: white;
            border: 5px solid #bdc3c7;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 180px;
        }

        .job-card:active {
            transform: scale(0.9);
        }

        .job-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            pointer-events: none;
        }

        #message {
            font-size: 40px;
            height: 50px;
            margin-top: 20px;
        }

        .correct { background-color: #2ecc71 !important; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; border-color: #c0392b !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="message">Touch the correct picture!</div>
    <div id="target-word">---</div>
    
    <div id="options-container">
        </div>
</div>

<script>
    const jobs = [
        { name: 'Teacher', img: 'https://cdn-icons-png.flaticon.com/512/1995/1995539.png' },
        { name: 'Police Officer', img: 'https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNjd0Y2g3aGhwZnVhM2diaWEwcjV3c21iYjk4ZzlwbDBmZmdhYnVnaSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o6MbfsJt8Idi8vYTS/giphy.gif' },
        { name: 'Engineer', img: 'https://cdn-icons-png.flaticon.com/512/2822/2822557.png' },
        { name: 'Reporter', img: 'https://cdn-icons-png.flaticon.com/512/3050/3050477.png' },
        { name: 'Singer', img: 'https://cdn-icons-png.flaticon.com/512/3048/3048374.png' },
        { name: 'Scientist', img: 'https://cdn-icons-png.flaticon.com/512/1085/1085794.png' },
        { name: 'Baseball Player', img: 'https://cdn-icons-png.flaticon.com/512/3356/3356199.png' },
        { name: 'Youtuber', img: 'https://cdn-icons-png.flaticon.com/512/3938/3938026.png' },
        { name: 'Firefighter', img: 'https://cdn-icons-png.flaticon.com/512/782/782761.png' },
        { name: 'Doctor', img: 'https://cdn-icons-png.flaticon.com/512/3774/3774299.png' }
    ];

    let currentJob;

    function startGame() {
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Pick a random job
        currentJob = jobs[Math.floor(Math.random() * jobs.length)];
        document.getElementById('target-word').innerText = currentJob.name;
        document.getElementById('message').innerText = "Where is the " + currentJob.name + "?";
        document.getElementById('message').style.color = "black";

        // Shuffle all jobs for the display
        const shuffledJobs = [...jobs].sort(() => 0.5 - Math.random());

        shuffledJobs.forEach(job => {
            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `<img src="${job.img}" alt="${job.name}">`;
            card.onclick = () => checkAnswer(job, card);
            container.appendChild(card);
        });
    }

    function checkAnswer(selected, element) {
        const msg = document.getElementById('message');
        if (selected.name === currentJob.name) {
            element.classList.add('correct');
            msg.innerText = "Excellent! 🎉";
            msg.style.color = "#2ecc71";
            setTimeout(startGame, 1500);
        } else {
            element.classList.add('wrong');
            msg.innerText = "Try again! ❌";
            msg.style.color = "#e74c3c";
            setTimeout(() => element.classList.remove('wrong'), 500);
        }
    }

    startGame();
</script>

</body>
</html>
